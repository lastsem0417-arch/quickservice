<div class="container py-lg">

<h2>Booking Management</h2>

<!-- FILTER -->

<div class="card mb-lg">

<label>Status Filter</label>

<select [(ngModel)]="selectedStatus" (change)="onStatusChange()">

<option *ngFor="let status of statuses" [value]="status">
{{status | titlecase}}
</option>

</select>

</div>

<!-- LOADING -->

<div *ngIf="loading">

<p>Loading bookings...</p>

</div>

<!-- BOOKINGS -->

<div *ngIf="!loading && bookings.length > 0" class="grid">

<div *ngFor="let booking of bookings" class="booking-card">

<h3>{{booking.serviceName}}</h3>

<p>
<b>User:</b> {{booking.userId?.name}}
</p>

<p>
<b>Date:</b> {{booking.bookingDate | date}}
</p>

<p>
<b>Status:</b>
<span class="badge">
{{booking.status}}
</span>
</p>

<div class="actions">

<button
*ngIf="booking.status === 'pending'"
(click)="approveBooking(booking)"
>
Approve
</button>

<button
*ngIf="booking.status === 'pending'"
(click)="rejectBooking(booking)"
>
Reject
</button>

<button
(click)="deleteBooking(booking)"
>
Delete
</button>

</div>

</div>

</div>

<!-- EMPTY -->

<div *ngIf="!loading && bookings.length === 0">

<p>No bookings found</p>

</div>

</div>
