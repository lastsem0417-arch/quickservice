<div class="dashboard">

  <h1>Welcome to QuickService 🚀</h1>
  <p class="subtitle">Your service booking platform. Manage everything easily.</p>

  <div class="cards">

    <div class="card">
      <h3>🛠 View Services</h3>
      <p>Explore all available services and book instantly.</p>
      <a routerLink="/services" class="btn">Browse Services</a>
    </div>

    <div class="card">
      <h3>📋 My Bookings</h3>
      <p>Track all your booked services and appointment details.</p>
      <a routerLink="/my-bookings" class="btn">View Bookings</a>
    </div>

  </div>

  <button class="logout" (click)="logout()">🚪 Logout</button>

</div>
